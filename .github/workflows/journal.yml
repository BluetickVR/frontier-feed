name: Journal + Retune

on:
  schedule:
    - cron: "30 16 * * *"  # 22:00 IST (16:30 UTC)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  journal:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e .

      - name: Run journal
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: feed journal

      - name: Commit state
        run: |
          git config user.email "action@frontier-feed"
          git config user.name "frontier-feed-bot"
          git add state/ journals/
          if ! git diff --cached --quiet; then
            git commit -m "journal: $(date -u +%Y-%m-%dT%H:%M)"
            git pull --rebase origin main
            git push origin main
          fi
