name: Deploy Site + Audio

on:
  workflow_run:
    workflows: ["Morning Push", "Evening Push"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e .

      - name: Generate audio briefing
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: feed briefing --slot morning || true

      - name: Generate site
        run: feed site

      - name: Deploy to gh-pages
        run: |
          git config user.email "action@frontier-feed"
          git config user.name "frontier-feed-bot"
          # Copy dist to a temp location
          cp -r site/dist /tmp/site-dist
          # Switch to gh-pages
          git checkout --orphan gh-pages-new
          git rm -rf .
          cp -r /tmp/site-dist/* .
          touch .nojekyll
          git add .
          git commit -m "site: $(date -u +%Y-%m-%dT%H:%M)"
          git push origin HEAD:gh-pages --force
