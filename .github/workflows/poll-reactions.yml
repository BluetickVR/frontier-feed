name: Poll Telegram Reactions

on:
  schedule:
    - cron: "*/5 * * * *"  # every 5 minutes
  workflow_dispatch: {}     # manual trigger

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e .

      - name: Poll reactions
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: feed poll

      - name: Commit reactions
        run: |
          git config user.email "action@frontier-feed"
          git config user.name "frontier-feed-bot"
          git add state/
          if ! git diff --cached --quiet; then
            git commit -m "reactions: $(date -u +%Y-%m-%dT%H:%M)"
            git pull --rebase origin main
            git push origin main
          fi
