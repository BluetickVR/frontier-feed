name: Weekly Synthesis

on:
  schedule:
    - cron: "30 15 * * 0"  # Sunday 21:00 IST (15:30 UTC)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e .

      - name: Run weekly synthesis
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: feed weekly

      - name: Commit state
        run: |
          git config user.email "action@frontier-feed"
          git config user.name "frontier-feed-bot"
          git add strategies/
          if ! git diff --cached --quiet; then
            git commit -m "weekly: $(date -u +%Y-%m-%dT%H:%M)"
            git pull --rebase origin main
            git push origin main
          fi
