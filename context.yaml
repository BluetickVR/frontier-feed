# Business signals (lightweight — used only to tailor follow-up dossier framing,
# NOT to rank daily digest items). The daily digest is about the external world.
business_filter_hints:
  - real estate vertical AI applications
  - voice agents for sales / call centers
  - workflow automation for sales teams
  - content generation for builders / marketing
  - agent deployments in enterprise SaaS

# Signal volume budget — tune these over time.
budgets:
  morning_push_max_items: 6
  evening_push_max_items: 3
  relevance_threshold: 0.55   # 0..1, items below this are dropped
  follow_up_threshold: 0.65   # '?' items must be above this to generate a dossier
  watchlist_high_signal: 0.70 # above this, watchlist items get pushed immediately
