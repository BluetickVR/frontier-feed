# Who you are and what signal is worth your attention.
# Used to rank items (via LLM) and to tailor follow-up dossiers.

identity:
  name: Anshul Padyal
  role: Founder/CTO, PropViz (real estate tech, acquired by MagicBricks Dec 2024)
  goal: Stay current on the AI frontier — tools, workflows, people, repos — so
    our product roadmap and internal workflows compound faster than competitors'.

# High-level topic buckets, in rough priority order.
# Scorer uses these to compute relevance.
topics:
  top_priority:
    - Claude / Anthropic ecosystem (SDK, MCP, skills, Claude Code, routines)
    - Agent frameworks and agent infra (LangGraph, CrewAI, Mastra, AgentKit)
    - AI coding tools (Cursor, Windsurf, Cline, Aider, Continue)
    - Voice AI (Realtime APIs, LiveKit, Moshi, Deepgram, Ultravox)
    - MCP servers and integrations

  high:
    - Foundation model releases (Anthropic, OpenAI, Google, Meta, Mistral, DeepSeek, Qwen)
    - Eval + benchmarks for agent/coding quality
    - Prompt + context engineering (cache, skills, tool design)
    - Agent SDKs and harnesses
    - Retrieval / vector / embeddings infra
    - Local inference (Ollama, llama.cpp, MLX)

  interesting:
    - AI product launches from notable founders
    - New OSS repos trending in AI topic
    - Applied AI case studies (esp. sales, real estate, industry-vertical SaaS)
    - Browser automation + agent-operated tooling

  deprioritize:
    - Pure NLP research papers with no applied angle
    - Generic LLM listicles and prompt packs
    - Crypto/AI token plays
    - AI ethics position pieces with no code

