# Who you are and what signal is worth your attention.
# Used to rank items (via LLM) and to tailor follow-up dossiers.

identity:
  name: Anshul Padyal
  role: "Founder/CTO, PropViz (acquired by MagicBricks/Times Group, Dec 2024)"
  ambition: "Build the #1 real estate tech company in the world. AI + 3D tech applied to property sales at a scale nobody else is attempting."
  what_we_have: "80+ builder clients, 18Cr/yr revenue, 200-person org, MagicBricks distribution. VR tours, 3D maps, AI voice caller, WhatsApp AI, inventory platform."
  what_we_need: "Every AI and 3D breakthrough that can widen our moat — voice AI, spatial computing, generative 3D, agent orchestration, browser automation, real-time rendering, LLM-powered sales workflows."
  scoring_lens: "Would this help us build something no other real estate tech company in the world has? Or change how we build software internally so fast that competitors can't keep up?"

# High-level topic buckets, in rough priority order.
# Scorer uses these to compute relevance.
topics:
  top_priority:
    - Voice AI + conversational AI (Realtime APIs, LiveKit, Moshi, Deepgram, Ultravox, Vapi, ElevenLabs)
    - 3D + spatial computing (Gaussian splatting, NeRF, 3D generation, WebGL, Three.js, AR/VR, Apple Vision Pro, spatial web)
    - Agent frameworks and orchestration (LangGraph, CrewAI, Mastra, AgentKit, Claude Agent SDK)
    - Claude / Anthropic ecosystem (SDK, MCP, skills, Claude Code, routines)
    - AI coding tools that 10x dev velocity (Cursor, Windsurf, Cline, Aider, Claude Code)
    - Generative media (image, video, 3D asset generation — product-applicable, not art)

  high:
    - Foundation model releases (Anthropic, OpenAI, Google, Meta, Mistral, DeepSeek, Qwen)
    - Browser automation + AI-operated tooling (Playwright, Puppeteer, agent-driven UIs)
    - Real-time rendering + streaming (WebRTC, WebGPU, live 3D in browser)
    - MCP servers and integrations
    - Prompt + context engineering (cache, skills, tool design)
    - AI-powered sales / CRM / customer engagement tools
    - WhatsApp / messaging platform AI integrations
    - Retrieval / vector / embeddings infra
    - AI infra that cuts costs or speeds up shipping (inference, fine-tuning, deployment)

  interesting:
    - AI product launches from notable founders
    - New OSS repos trending in AI topic
    - PropTech / real estate tech AI applications (anywhere in the world)
    - AR/VR hardware + SDK releases
    - Computer vision for physical spaces
    - Applied AI case studies in enterprise / vertical SaaS

  deprioritize:
    - Pure NLP research papers with no applied angle
    - Generic LLM listicles and prompt packs
    - Crypto/AI token plays
    - AI ethics position pieces with no code
    - Social media AI tools (scheduling, content generation for influencers)

